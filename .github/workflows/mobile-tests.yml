# ABOUTME: CI workflow for Pierre Mobile app (React Native/Expo)
# ABOUTME: Runs unit tests, type checking, linting, and Maestro E2E tests on push/PR

name: Mobile Tests

on:
  push:
    branches: [ "main", "debug/*", "feature/*", "claude/*" ]
    paths:
      - 'frontend-mobile/**'
      - 'packages/**'
      - 'src/routes/auth.rs'
      - 'src/routes/coaches.rs'
      - 'src/routes/chat.rs'
      - 'src/models/**'
      - '.github/workflows/mobile-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend-mobile/**'
      - 'packages/**'
      - 'src/routes/auth.rs'
      - 'src/routes/coaches.rs'
      - 'src/routes/chat.rs'
      - 'src/models/**'
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Security: Explicit permissions following principle of least privilege
permissions:
  contents: read

jobs:
  mobile-unit-tests:
    name: Mobile Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared-types dependencies
        working-directory: packages/shared-types
        run: bun install

      - name: Install api-client dependencies
        working-directory: packages/api-client
        run: bun install

      - name: Install mobile dependencies
        working-directory: frontend-mobile
        run: bun install

      - name: Type check
        working-directory: frontend-mobile
        run: bun run typecheck

      - name: Run unit tests
        working-directory: frontend-mobile
        run: bun run test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: frontend-mobile/coverage/
          retention-days: 7

  mobile-integration-tests:
    name: Mobile Integration Tests (Real Server)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mobile-integration-1.92.0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mobile-integration-1.92.0-
            ${{ runner.os }}-cargo-

      - name: Build Pierre server (release for performance)
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Install shared-types dependencies
        working-directory: packages/shared-types
        run: bun install

      - name: Install api-client dependencies
        working-directory: packages/api-client
        run: bun install

      - name: Install mobile dependencies
        working-directory: frontend-mobile
        run: bun install

      - name: Create data directory
        run: mkdir -p data

      - name: Start Pierre server
        run: |
          ./target/release/pierre-mcp-server &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/health > /dev/null; then
              echo "Server is healthy!"
              break
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
        env:
          DATABASE_URL: "sqlite:${{ github.workspace }}/data/mobile-integration-test.db"
          PIERRE_MASTER_ENCRYPTION_KEY: "rEFe91l6lqLahoyl9OSzum9dKa40VvV5RYj8bHGNTeo="
          PIERRE_RSA_KEY_SIZE: "2048"
          HTTP_PORT: "8081"
          RUST_LOG: "warn"
          STRAVA_CLIENT_ID: "test_client_id_ci"
          STRAVA_CLIENT_SECRET: "test_client_secret_ci"
          STRAVA_REDIRECT_URI: "http://localhost:8081/auth/strava/callback"

      - name: Run mobile integration tests
        working-directory: frontend-mobile
        run: bun run e2e:integration
        env:
          CI: true
          BACKEND_URL: "http://localhost:8081"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mobile-integration-test-results
          path: frontend-mobile/integration/
          retention-days: 7

  mobile-e2e-maestro:
    name: Mobile E2E Tests (Maestro)
    runs-on: macos-latest
    # Run on main, claude/* branches, or when explicitly triggered
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-maestro-1.92.0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-maestro-1.92.0-
            ${{ runner.os }}-cargo-

      - name: Build Pierre server (release for performance)
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared-types dependencies
        working-directory: packages/shared-types
        run: bun install

      - name: Install api-client dependencies
        working-directory: packages/api-client
        run: bun install

      - name: Install mobile dependencies
        working-directory: frontend-mobile
        run: bun install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Create data directory
        run: mkdir -p data

      - name: Start Pierre server
        run: |
          ./target/release/pierre-mcp-server &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/health > /dev/null; then
              echo "Server is healthy!"
              break
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
        env:
          DATABASE_URL: "sqlite:${{ github.workspace }}/data/maestro-test.db"
          PIERRE_MASTER_ENCRYPTION_KEY: "rEFe91l6lqLahoyl9OSzum9dKa40VvV5RYj8bHGNTeo="
          PIERRE_RSA_KEY_SIZE: "2048"
          HTTP_PORT: "8081"
          RUST_LOG: "warn"
          STRAVA_CLIENT_ID: "test_client_id_ci"
          STRAVA_CLIENT_SECRET: "test_client_secret_ci"
          STRAVA_REDIRECT_URI: "http://localhost:8081/auth/strava/callback"

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Boot iOS Simulator
        run: |
          SIMULATOR_UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro (" | head -1 | grep -oE '[0-9A-Fa-f-]{36}')
          if [ -z "$SIMULATOR_UDID" ]; then
            SIMULATOR_UDID=$(xcrun simctl list devices available | grep "iPhone 16 (" | head -1 | grep -oE '[0-9A-Fa-f-]{36}')
          fi
          if [ -z "$SIMULATOR_UDID" ]; then
            SIMULATOR_UDID=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE '[0-9A-Fa-f-]{36}')
          fi
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "No iPhone simulator found!"
            exit 1
          fi
          echo "Booting simulator: $SIMULATOR_UDID"
          xcrun simctl boot "$SIMULATOR_UDID" || echo "Simulator may already be booted"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> $GITHUB_ENV

      # Cache the built iOS app to avoid rebuilding every time
      - name: Cache iOS app build
        id: ios-app-cache
        uses: actions/cache@v4
        with:
          path: frontend-mobile/ios-app-cache
          key: ios-app-${{ runner.os }}-${{ hashFiles('frontend-mobile/app.json', 'frontend-mobile/package.json', 'frontend-mobile/ios/**', 'frontend-mobile/src/**') }}

      - name: Restore cached iOS app
        if: steps.ios-app-cache.outputs.cache-hit == 'true'
        run: |
          echo "Cache hit! Restoring iOS app..."
          cd frontend-mobile
          tar -xzf ios-app-cache/Pierre.app.tar.gz -C /tmp
          xcrun simctl install $SIMULATOR_UDID /tmp/Pierre.app
          echo "IOS_APP_CACHED=true" >> $GITHUB_ENV

      - name: Cache CocoaPods
        if: steps.ios-app-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: frontend-mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('frontend-mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Prebuild iOS
        if: steps.ios-app-cache.outputs.cache-hit != 'true'
        working-directory: frontend-mobile
        run: bunx expo prebuild --platform ios --clean

      - name: Build and install app on simulator
        if: steps.ios-app-cache.outputs.cache-hit != 'true'
        working-directory: frontend-mobile
        run: |
          bunx expo run:ios --no-install --device $SIMULATOR_UDID
          xcrun simctl install $SIMULATOR_UDID ios/build/Build/Products/Debug-iphonesimulator/Pierre.app
          # Cache the built app for next time
          mkdir -p ios-app-cache
          tar -czf ios-app-cache/Pierre.app.tar.gz -C ios/build/Build/Products/Debug-iphonesimulator Pierre.app

      - name: Run Maestro tests
        working-directory: frontend-mobile
        run: |
          $HOME/.maestro/bin/maestro test .maestro/ --format junit --output maestro-results.xml
        env:
          TEST_EMAIL: "mobiletest@pierre.dev"
          TEST_PASSWORD: "MobileTest123!"
          BACKEND_URL: "http://localhost:8081"

      - name: Upload Maestro test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results-ios
          path: |
            frontend-mobile/maestro-results.xml
            frontend-mobile/.maestro/
          retention-days: 7

  mobile-e2e-maestro-android:
    name: Mobile E2E Tests - Android (Maestro)
    runs-on: ubuntu-latest
    # Run on main, claude/* branches, or when explicitly triggered
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-maestro-android-1.92.0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-maestro-android-1.92.0-
            ${{ runner.os }}-cargo-

      - name: Build Pierre server (release for performance)
        run: cargo build --release
        env:
          CARGO_INCREMENTAL: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared-types dependencies
        working-directory: packages/shared-types
        run: bun install

      - name: Install api-client dependencies
        working-directory: packages/api-client
        run: bun install

      - name: Install mobile dependencies
        working-directory: frontend-mobile
        run: bun install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Free disk space for Android build
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Preserve Pierre server binary before cleanup
          cp ./target/release/pierre-mcp-server /tmp/pierre-mcp-server
          # Remove large packages not needed for Android/mobile testing
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/microsoft/msedge
          sudo rm -rf /opt/google/chrome
          # Clean up Rust target directory (binary preserved above)
          rm -rf target
          echo "Disk space after cleanup:"
          df -h

      - name: Create data directory
        run: mkdir -p data

      - name: Start Pierre server
        run: |
          /tmp/pierre-mcp-server &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/health > /dev/null; then
              echo "Server is healthy!"
              break
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
        env:
          DATABASE_URL: "sqlite:${{ github.workspace }}/data/maestro-android-test.db"
          PIERRE_MASTER_ENCRYPTION_KEY: "rEFe91l6lqLahoyl9OSzum9dKa40VvV5RYj8bHGNTeo="
          PIERRE_RSA_KEY_SIZE: "2048"
          HTTP_PORT: "8081"
          RUST_LOG: "warn"
          STRAVA_CLIENT_ID: "test_client_id_ci"
          STRAVA_CLIENT_SECRET: "test_client_secret_ci"
          STRAVA_REDIRECT_URI: "http://localhost:8081/auth/strava/callback"

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prebuild Android
        working-directory: frontend-mobile
        run: bunx expo prebuild --platform android --clean

      - name: Build Android APK with embedded bundle
        working-directory: frontend-mobile
        run: |
          # Set API URL for the embedded bundle (10.0.2.2 is Android emulator's host)
          export EXPO_PUBLIC_API_URL="http://10.0.2.2:8081"

          # Build debug APK with JavaScript bundle embedded
          # This avoids needing Metro bundler during E2E tests
          cd android
          ./gradlew assembleDebug -PbundleInDebug=true
        env:
          GRADLE_OPTS: "-Xmx4g -XX:+UseParallelGC"

      - name: Run Maestro tests on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          avd-name: maestro_test_emulator
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Install the APK (has JS bundle embedded, no Metro needed)
            adb install frontend-mobile/android/app/build/outputs/apk/debug/app-debug.apk

            # Run Maestro tests
            cd frontend-mobile && $HOME/.maestro/bin/maestro test .maestro/ --format junit --output maestro-results-android.xml
        env:
          TEST_EMAIL: "mobiletest@pierre.dev"
          TEST_PASSWORD: "MobileTest123!"
          BACKEND_URL: "http://10.0.2.2:8081"

      - name: Upload Maestro test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-test-results-android
          path: |
            frontend-mobile/maestro-results-android.xml
            frontend-mobile/.maestro/
          retention-days: 7
