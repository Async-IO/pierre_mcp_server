# ABOUTME: Test sending message and receiving response
# ABOUTME: Converted from chat.test.js "should send message and receive response"

appId: com.asyncio.pierre

---
# Launch and login
- runFlow:
    file: ../helpers/launch-app.yaml
- runFlow:
    file: ../helpers/login.yaml

# Start fresh conversation
- runFlow:
    file: ../helpers/new-chat.yaml

# Type and send a message
- tapOn:
    id: "message-input"
- inputText: "What is my fitness level?"
- tapOn:
    id: "send-button"

# Wait for response (Pierre thinking indicator should appear then disappear)
- assertVisible:
    text: "Pierre is thinking..."
    timeout: 5000

- assertNotVisible:
    text: "Pierre is thinking..."
    timeout: 30000
