# ABOUTME: Helper flow to log out of the application
# ABOUTME: Navigates to Settings and taps the logout button

appId: com.pierre.fitness

---
# Navigate to Settings
- runFlow:
    file: navigate-to-settings.yaml

# Scroll down if needed to see logout button
- scrollUntilVisible:
    element: "Log Out"
    direction: DOWN
    timeout: 5000

# Tap logout button (the button shows "Log Out" text)
- tapOn: "Log Out"

# Confirm logout if a confirmation dialog appears
- runFlow:
    when:
      visible: "Log Out"
    commands:
      - tapOn: "Log Out"

# Verify we're back on login screen (using text selector)
- extendedWaitUntil:
    visible: "Welcome to Pierre"
    timeout: 5000
