# ABOUTME: Helper flow to navigate from any screen to Social/Activity
# ABOUTME: Uses bottom tab navigation to reach the Social Feed screen

appId: com.pierre.fitness

---
# Tap the Social tab using text selector (more reliable on Android)
# The tab has accessibilityLabel="Insights"
- tapOn: "Insights"

# Wait for social feed screen to load
- extendedWaitUntil:
    visible:
      id: "social-feed-screen"
    timeout: 5000
