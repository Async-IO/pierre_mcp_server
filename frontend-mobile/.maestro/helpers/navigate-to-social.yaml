# ABOUTME: Helper flow to navigate from any screen to Social
# ABOUTME: Uses drawer navigation to reach the Social screen

appId: com.asyncio.pierre

---
# Open the drawer menu
- tapOn:
    id: "menu-button"

# Wait for drawer to open and tap Social
- extendedWaitUntil:
    visible:
      text: "Social"
    timeout: 3000
- tapOn: "Social"

# Wait for social screen to load
- extendedWaitUntil:
    visible:
      id: "social-screen"
    timeout: 5000
