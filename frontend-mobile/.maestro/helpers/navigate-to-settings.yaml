# ABOUTME: Helper flow to navigate from any screen to Settings
# ABOUTME: Uses bottom tab navigation to reach the Settings screen

appId: com.pierre.fitness

---
# Tap the Settings tab using text selector (more reliable on Android)
# The tab has accessibilityLabel="Settings"
- tapOn: "Settings"

# Wait for settings screen to load
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 5000
