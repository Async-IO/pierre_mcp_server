# ABOUTME: Helper flow to start a fresh chat conversation
# ABOUTME: Taps the new chat button and verifies the chat title resets

appId: com.asyncio.pierre

---
# Tap the new chat button (displays "+" text)
# Using text selector for Android compatibility
- tapOn: "+"

# Verify we're in a new chat by checking for "New Chat" default title
- assertVisible: "New Chat"
