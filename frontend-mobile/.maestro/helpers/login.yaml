# ABOUTME: Helper flow to perform login with test credentials
# ABOUTME: Logs in using mobiletest@pierre.dev / MobileTest123! and waits for chat screen

appId: com.pierre.fitness

---
# Wait for login screen to be visible using text (more reliable on Android)
- extendedWaitUntil:
    visible: "Welcome to Pierre"
    timeout: 10000

# Clear any pre-filled values and enter test credentials
# Using text selectors for labels as fallback
- tapOn: "Email"
- eraseText
- inputText: ${TEST_EMAIL}

- tapOn: "Password"
- eraseText
- inputText: ${TEST_PASSWORD}

# Hide keyboard
- hideKeyboard

# Wait for Sign In button to be visible and tap
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 5000
- tapOn: "Sign In"

# Wait for successful login - use Chat tab text as indicator
# The tab bar has "Chat" label visible after login
- extendedWaitUntil:
    visible: "Chat"
    timeout: 15000
