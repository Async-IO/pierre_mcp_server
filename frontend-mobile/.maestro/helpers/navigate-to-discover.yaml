# ABOUTME: Helper flow to navigate from any screen to Discover (Store)
# ABOUTME: Uses bottom tab navigation then navigates to Store screen

appId: com.pierre.fitness

---
# Tap the Coaches tab using text selector (more reliable on Android)
# The tab has accessibilityLabel="Coaches"
- tapOn: "Coaches"

# Wait for coaches screen to load
- extendedWaitUntil:
    visible:
      id: "coach-library-screen"
    timeout: 5000

# Note: Store screen is accessed from within the Coaches tab
# The store-screen testID is available when viewing the Store
