# ABOUTME: Helper flow to send a chat message
# ABOUTME: Types a message and sends it, optionally waits for response

appId: com.asyncio.pierre

---
# Type message in the input field (tap on placeholder text for Android compatibility)
- tapOn: "Message Pierre..."
- inputText: ${MESSAGE}

# Hide keyboard before tapping send
- hideKeyboard

# Tap send button - it's a TouchableOpacity with an icon, try using id first
# If this fails on Android, may need to add accessibilityLabel to the component
- tapOn:
    id: "send-button"
