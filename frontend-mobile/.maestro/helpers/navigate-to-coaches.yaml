# ABOUTME: Helper flow to navigate from any screen to My Coaches
# ABOUTME: Uses bottom tab navigation to reach the Coach Library screen

appId: com.pierre.fitness

---
# Tap the Coaches tab using text selector (more reliable on Android)
# The tab has accessibilityLabel="Coaches"
- tapOn: "Coaches"

# Wait for coach library screen to load
- extendedWaitUntil:
    visible:
      id: "coach-library-screen"
    timeout: 5000
