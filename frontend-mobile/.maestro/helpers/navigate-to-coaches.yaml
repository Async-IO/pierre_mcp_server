# ABOUTME: Helper flow to navigate from any screen to My Coaches
# ABOUTME: Uses drawer navigation to reach the Coach Library screen

appId: com.asyncio.pierre

---
# Open the drawer menu
- tapOn:
    id: "menu-button"

# Wait for drawer to open and tap My Coaches
- extendedWaitUntil:
    visible:
      text: "My Coaches"
    timeout: 3000
- tapOn: "My Coaches"

# Wait for coach library screen to load
- extendedWaitUntil:
    visible:
      id: "coach-library-screen"
    timeout: 5000
