# ABOUTME: Test coach uninstall flow from the store
# ABOUTME: Converted from store.test.js "install/uninstall flow" tests

appId: com.asyncio.pierre

---
# Launch and login
- runFlow:
    file: ../helpers/launch-app.yaml
- runFlow:
    file: ../helpers/login.yaml

# Navigate to Discover
- runFlow:
    file: ../helpers/navigate-to-discover.yaml

# Navigate to a coach detail
- runFlow:
    when:
      visible:
        id: "coach-card-0"
    commands:
      - tapOn:
          id: "coach-card-0"
      - assertVisible:
          id: "store-coach-detail-screen"
          timeout: 5000

      # Check if Uninstall is available
      - runFlow:
          when:
            visible: "Uninstall"
          commands:
            # Tap uninstall
            - tapOn: "Uninstall"

            # Confirm uninstall in alert
            - assertVisible:
                text: "Uninstall Coach?"
                timeout: 3000

            # Tap the Uninstall button in the dialog
            - tapOn: "Uninstall"

            # Should show confirmation
            - assertVisible:
                text: "Uninstalled"
                timeout: 5000

            # Dismiss alert
            - tapOn: "OK"

            # Should now show Install button
            - assertVisible:
                text: "Install Coach"
                timeout: 5000

      # Navigate back
      - tapOn:
          id: "back-button"
