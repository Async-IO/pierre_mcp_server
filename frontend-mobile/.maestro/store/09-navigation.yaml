# ABOUTME: Test navigation from Discover screen
# ABOUTME: Converted from store.test.js "navigation" tests

appId: com.asyncio.pierre

---
# Launch and login
- runFlow:
    file: ../helpers/launch-app.yaml
- runFlow:
    file: ../helpers/login.yaml

# Navigate to Discover
- runFlow:
    file: ../helpers/navigate-to-discover.yaml

# Test: should navigate back to drawer on menu button
- tapOn:
    id: "menu-button"

# Drawer should be visible
- extendedWaitUntil:
    visible:
      text: "Discover"
    timeout: 3000

# Close drawer by tapping Discover
- tapOn: "Discover"

# Test: should navigate to My Coaches from drawer
- tapOn:
    id: "menu-button"

- extendedWaitUntil:
    visible:
      text: "My Coaches"
    timeout: 3000
- tapOn: "My Coaches"

# Should see coach library
- extendedWaitUntil:
    visible:
      id: "coach-library-screen"
    timeout: 5000

# Navigate back to store
- tapOn:
    id: "menu-button"
- tapOn: "Discover"

- extendedWaitUntil:
    visible:
      id: "store-screen"
    timeout: 5000
